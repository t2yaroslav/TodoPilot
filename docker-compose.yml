services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_DEBUG: ${LLM_DEBUG:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - proxy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - proxy

configs:
  nginx_conf:
    content: |
      log_format json_combined escape=json
        '{"ts":"$$time_iso8601","source":"nginx","level":"info",'
         '"method":"$$request_method","path":"$$uri","status":$$status,'
         '"duration_s":$$request_time,"client":"$$remote_addr",'
         '"upstream_time":"$$upstream_response_time","bytes":$$body_bytes_sent}';

      upstream backend {
          server backend:8000;
      }

      upstream frontend {
          server frontend:80;
      }

      server {
          listen 80;
          server_name localhost;

          client_max_body_size 10M;

          access_log /dev/stdout json_combined;
          error_log /dev/stderr warn;

          location /api/ {
              proxy_pass http://backend;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 300s;
              proxy_connect_timeout 60s;
              proxy_send_timeout 60s;
          }

          location / {
              proxy_pass http://frontend;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }
      }

networks:
  proxy:
    external: true